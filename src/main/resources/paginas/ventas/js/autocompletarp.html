<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="es">
<body>
<script type="text/javascript" th:fragment="producto">
        $(document).ready(function(){
        $("#nombre_2").autocomplete({
            source: function(request,response){
              $.ajax({
                    url:"/agregar-venta/buscar-producto-nombre/"+request.term,
                    dataType:"json",
                    data:{
                        term: request.term
                    },
                    success: function(data){
                        response($.map(data,function(item){
                            return{
                                 value:item.id_producto,
                                 label:item.nombre,
                            };
                        }));
                    },
              });
            },
            select: function(event,ui){
               $("#nombre_2").val(ui.item.label);
               $("#idProducto").val(ui.item.value);
               return false;
            }
        });
    }
    );


</script>
</body>
</html>
