<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{plantillas/plantilla :: head}"></head>
<body>
<header th:replace="~{plantillas/plantilla :: header}"></header>
<div class="container-fluid">

    <div th:if="${param.exito}" class="alert alert-success text-center">
        ¡Calificación asignada/actualizada correctamente!
    </div>
    <div th:if="${param.correoExito}" class="alert alert-success text-center">
        ¡Boleta enviada correctamente al alumno y a su tutor!
    </div>
    <div th:if="${param.correoError}" class="alert alert-danger text-center">
        Hubo un problema al enviar el correo.
    </div>

    <main class="container text-center col-md-8 p-4 shadow-lg p-3 mb-5 bg-body-tertiary rounded">
        <h1 class="card-header"><strong>Asignar Calificaciones</strong></h1>
        <div class="card-body">

            <form th:action="@{/profesores/asignar-calificacion}" th:object="${inscripcionDTO}" method="post">
                <div class="row justify-content-center">

                    <div class="col-md-8 mb-3">
                        <div class="form-group text-start">
                            <label for="id" class="form-label fw-bold">Seleccionar Alumno (Inscripción):</label>
                            <select class="form-select" th:classappend="${#fields.hasErrors('id')} ? 'is-invalid' : ''" id="id" name="id" th:field="*{id}">
                                <option value="" selected>Selecciona un alumno...</option>
                                <option th:each="inscripcion : ${listaInscripciones}"
                                        th:value="${inscripcion.id}"
                                        th:text="${inscripcion.alumno.usuario.nombre} + ' ' + ${inscripcion.alumno.usuario.apellido} + ' - ' + ${inscripcion.grupo.asignatura.nombre}">
                                </option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('id')}" th:errors="*{id}"></div>
                        </div>
                    </div>

                    <div class="col-md-4 mb-3">
                        <div class="form-group text-start">
                            <label for="calificacion" class="form-label fw-bold">Calificación (0 a 10):</label>
                            <input type="number" step="0.1" class="form-control" th:classappend="${#fields.hasErrors('calificacion')} ? 'is-invalid' : ''" id="calificacion" name="calificacion" placeholder="Ej. 8.5" th:field="*{calificacion}">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('calificacion')}" th:errors="*{calificacion}"></div>
                        </div>
                    </div>

                    <input type="hidden" id="idAlumno" name="idAlumno" value="1" />
                    <input type="hidden" id="idGrupo" name="idGrupo" value="1" />

                </div>

                <div class="col-md-12 mt-4">
                    <button type="submit" class="btn btn-success btn-lg">Guardar Calificación</button>
                </div>
            </form>

            <hr class="mt-5 mb-4 border-2">
            <h3 class="mb-3">Envío de Boletas Oficiales</h3>

            <div class="table-responsive">
                <table class="table table-striped table-hover table-sm align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>Alumno</th>
                        <th>Materia</th>
                        <th>Calificación</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="inscripcion : ${listaInscripciones}">
                        <td th:text="${inscripcion.alumno.usuario.nombre} + ' ' + ${inscripcion.alumno.usuario.apellido}"></td>
                        <td th:text="${inscripcion.grupo.asignatura.nombre}"></td>
                        <td th:text="${inscripcion.calificacion != null ? inscripcion.calificacion : 'Sin calificar'}"></td>
                        <td>
                            <a th:href="@{/profesores/descargar-calificacion/{id}(id=${inscripcion.id})}" class="btn btn-sm btn-outline-danger" title="Descargar PDF">
                                <i class="bi bi-file-earmark-pdf"></i> PDF
                            </a>

                            <a th:href="@{/profesores/enviar-calificacion/{id}(id=${inscripcion.id})}" class="btn btn-sm btn-primary" title="Enviar a Alumno y Padre">
                                <i class="bi bi-envelope-check"></i> Enviar Boleta
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<footer th:replace="~{plantillas/plantilla::footer}"></footer>
<script th:replace="~{plantillas/plantilla::paginaScripts}"></script>
</body>
</html>
