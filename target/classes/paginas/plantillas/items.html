<div th:fragment="items(index)">
  <div class="row mb-2 item-row">
    <div class="col-6">
      <input type="text"
             class="form-control"
             th:name="|items[${index}].nombre|"
             placeholder="Nombre del item">
    </div>
    <div class="col-2">
      <button type="button"
              class="btn btn-danger"
              onclick="eliminar(this)">
        X
      </button>
    </div>
  </div>
</div>
