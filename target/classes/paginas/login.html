<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{plantillas/plantilla :: head}"></head>
<body>
<header th:replace="~{plantillas/plantilla :: header}"></header>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <main class="col-md-4 p-4 shadow-lg p-3 mb-5 bg-body-tertiary rounded text-center">

        <h2 class="mb-4"><strong>Bienvenido a EscuRed</strong></h2>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${param.logout}" class="alert alert-info">Has cerrado sesión correctamente.</div>

        <form th:action="@{/login}" method="post">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="email" name="email" placeholder="correo@ejemplo.com" required>
                <label for="email">Correo Electrónico</label>
            </div>

            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="password" name="password" placeholder="Contraseña" required>
                <label for="password">Contraseña</label>
            </div>

            <button class="w-100 btn btn-lg btn-primary" type="submit">Ingresar</button>
        </form>
    </main>
</div>

<footer th:replace="~{plantillas/plantilla::footer}"></footer>
<script th:replace="~{plantillas/plantilla::paginaScripts}"></script>
</body>
</html>
