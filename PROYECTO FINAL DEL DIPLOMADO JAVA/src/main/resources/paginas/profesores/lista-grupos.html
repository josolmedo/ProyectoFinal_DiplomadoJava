<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{plantillas/plantilla :: head}"></head>
<body>
<header th:replace="~{plantillas/plantilla :: header}"></header>
<div class="container-fluid">

    <div th:if="${param.correoExito}" class="alert alert-success text-center">¡Reporte enviado correctamente a tu correo institucional!</div>
    <div th:if="${param.correoError}" class="alert alert-danger text-center">Hubo un problema al enviar el correo.</div>

    <main class="container text-center col-md-8 p-4 shadow-lg p-3 mb-5 bg-body-tertiary rounded">
        <h1 class="card-header"><strong>Mis Grupos Asignados</strong></h1>
        <div class="card-body">

            <div class="d-flex justify-content-end mb-3 gap-2">
                <a class="btn btn-danger" th:href="@{/profesores/descargar-mis-grupos}">
                    <i class="bi bi-file-earmark-pdf"></i> Descargar PDF
                </a>
                <a class="btn btn-primary" th:href="@{/profesores/enviar-mis-grupos}">
                    <i class="bi bi-envelope"></i> Enviar a mi correo
                </a>
            </div>

            <div class="table-responsive mt-4">
                <table class="table table-striped table-hover table-sm align-middle">
                    <thead class="table-dark table-bordered">
                    <tr>
                        <th>Grupo</th>
                        <th>Asignatura</th>
                        <th>Alumno Inscrito</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="inscripcion : ${misGrupos}">
                        <td class="fw-bold" th:text="${inscripcion.grupo.nombre}"></td>
                        <td th:text="${inscripcion.grupo.asignatura.nombre}"></td>
                        <td th:text="${inscripcion.alumno.usuario.nombre} + ' ' + ${inscripcion.alumno.usuario.apellido}"></td>
                    </tr>
                    </tbody>
                </table>

                <div th:if="${misGrupos.isEmpty()}" class="alert alert-info mt-3">
                    Aún no tienes alumnos inscritos en tus grupos.
                </div>
            </div>

        </div>
    </main>
</div>
<footer th:replace="~{plantillas/plantilla::footer}"></footer>
<script th:replace="~{plantillas/plantilla::paginaScripts}"></script>
</body>
</html>
